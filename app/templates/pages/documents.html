<div class="row g-3">
  <div class="col-12 col-xl-4">
    <div class="card studio-card">
      <div class="card-body upload-panel">
        <div class="upload-icon">↑</div>
        <h5>Upload documents</h5>
        <p>PDF, DOCX, TXT, MD, CSV, XLSX and HTML files.</p>
        <button class="btn btn-primary w-100">Choose files</button>
        <button class="btn btn-outline-secondary w-100 mt-2">Start ingestion</button>
      </div>
    </div>
  </div>
  <div class="col-12 col-xl-8">
    <div class="card studio-card">
      <div class="card-header studio-card-header d-flex justify-content-between align-items-center">
        <div><div class="section-title">Document Library</div><div class="section-subtitle">Source document entities from the backend.</div></div>
        <span id="documentsCount" class="badge text-bg-info-soft">Loading</span>
      </div>
      <div class="table-responsive">
        <table class="table studio-table mb-0">
          <thead><tr><th>Source</th><th>Status</th><th>Extension</th><th>Hash</th><th>Document ID</th></tr></thead>
          <tbody id="documentsTableBody">
            <tr>
              <td colspan="5" class="text-center text-muted py-4">Loading documents...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
